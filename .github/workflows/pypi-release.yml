# Build and publish the Python package to PyPI using the Serapieum composite action.

name: pypi-release

on:
  workflow_dispatch:
    inputs:
      release-branch:
        description: "Branch to publish from"
        required: false
        default: "main"
  workflow_run:
    workflows: ['github-release']
    types: [completed]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      # When triggered via workflow_dispatch, check out the branch the user selected.
      # When triggered via workflow_run (after github-release succeeds), check out the same branch
      # that github-release ran against — github.event.workflow_run.head_branch carries that value,
      # whereas the default checkout ref for workflow_run is always the repository's default branch.
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release-branch || github.event.workflow_run.head_branch }}

      - name: Build and publish to PyPI
        uses: serapeum-org/github-actions/actions/release/pypi@pypi-release/v1
        with:
          pypi-username: __token__
          pypi-password: ${{ secrets.PYPI_PUBLISH }}
          python-version: '3.12'
          package-manager: 'uv'
          install-groups: "groups: dev"
          verify-lock: 'false'
          # pypi-repository-url: 'https://test.pypi.org/legacy/'
