name: Deploy MkDocs

permissions:
  contents: write
  pages: write

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '**'  # Match all branches for pull requests
  release:
      types:
        - published
  workflow_run:
    workflows: ['github-release']
    types: [completed]

jobs:
  deploy-pr:
      if: github.event_name == 'pull_request'
      runs-on: ubuntu-latest
      steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: serapeum-org/github-actions/actions/mkdocs-deploy@mkdocs/v1
        with:
          trigger: 'pull_request'
          package-manager: 'uv'
          python-version: '3.12'
          install-groups: 'groups: docs'
          install-extras: 'extras: all'
          deploy-token: ${{ secrets.ACTIONS_DEPLOY_TOKEN }}

  deploy-main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0
    - uses: serapeum-org/github-actions/actions/mkdocs-deploy@mkdocs/v1
      with:
        trigger: 'main'
        package-manager: 'uv'
        python-version: '3.12'
        install-groups: 'groups: docs'
        install-extras: 'extras: all'
        deploy-token: ${{ secrets.ACTIONS_DEPLOY_TOKEN }}

  deploy-release:
    if: github.event_name == 'release' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
    # For a `release` event, github.ref is the tag ref (refs/tags/<version>) — the default checkout
    # behavior is correct. For a `workflow_run` event (triggered after github-release succeeds),
    # github.ref defaults to the repository's default branch, so override it to the branch that
    # github-release actually ran against, which is carried on workflow_run.head_branch and
    # contains the version-bump commit that commitizen just pushed.
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0
        ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref }}
    - uses: serapeum-org/github-actions/actions/mkdocs-deploy@mkdocs/v1
      with:
        trigger: 'release'
        package-manager: 'uv'
        python-version: '3.12'
        install-groups: 'groups: docs'
        install-extras: 'extras: all'
        deploy-token: ${{ secrets.ACTIONS_DEPLOY_TOKEN }}
        mike-alias: 'latest'
